[build]
builder = "RAILPACK"
buildCommand = "cd backend && npm ci && npx prisma generate && npm run build"

[deploy]
startCommand = "cd backend && node dist/src/main.js"
preDeployCommand = "chmod +x ./backend/railway/init-app.sh && cd backend && ./railway/init-app.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
