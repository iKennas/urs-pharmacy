[build]
builder = "RAILPACK"
buildCommand = "cd backend && npm ci && npx prisma generate && npm run build"

[deploy]
startCommand = "node backend/dist/src/main.js"
preDeployCommand = "cd backend && npx prisma db push && npx tsx prisma/seed.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
